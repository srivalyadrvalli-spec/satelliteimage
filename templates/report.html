<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Report - GeoView</title>
    <style>
        body{font-family:Arial,Helvetica,sans-serif;background:#f0f4f8;margin:0;padding:0;}
        .container{max-width:800px;margin:100px auto;padding:20px;background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
        h1{margin-bottom:20px;color:#333;}
        label{display:block;margin:10px 0 5px;color:#555;font-weight:600;}
        input[type=text],textarea,input[type=number],input[type=file]{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;}
        button{margin-top:15px;padding:10px 20px;background:#667eea;color:#fff;border:none;border-radius:4px;cursor:pointer;}
        button:hover{background:#5a67d8;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Submit a Report</h1>
        <form id="reportForm" method="post" enctype="multipart/form-data">
            <label for="user_name">Your Name</label>
            <input type="text" id="user_name" name="user_name" required>

            <label for="land_owner">Land Owner</label>
            <input type="text" id="land_owner" name="land_owner">

            <label for="description">Description of Issue</label>
            <textarea id="description" name="description" rows="4" required></textarea>

            <label>Coordinates</label>
            <input type="number" step="0.000001" name="latitude" placeholder="Latitude">
            <input type="number" step="0.000001" name="longitude" placeholder="Longitude">

            <label for="before_image">Before Image</label>
            <input type="file" id="before_image" name="before_image" accept="image/*">
            <label for="after_image">After Image</label>
            <input type="file" id="after_image" name="after_image" accept="image/*">

            <button type="submit">Submit Report</button>
        </form>
        <div id="status"></div>
    </div>
    <script>
        document.getElementById('reportForm').addEventListener('submit', function(e){
            e.preventDefault();
            var formData = new FormData(this);
            fetch('/report', {method:'POST', body: formData})
                .then(res=>res.json())
                .then(data=>{document.getElementById('status').innerText='Report submitted! Thank you.'; this.reset();})
                .catch(err=>{document.getElementById('status').innerText='Error submitting report.';});
        });
    </script>
</body>
</html>
