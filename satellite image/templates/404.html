<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #0f172a;
        }
        .card {
            background: #fff;
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        h1 { margin: 0 0 6px; font-size: 26px; color: #111827; }
        p { margin: 0 0 16px; color: #6b7280; }
        a {
            display: inline-block;
            margin: 6px 8px 0;
            padding: 12px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 10px 24px rgba(102,126,234,0.35);
        }
        .muted { color: #9ca3af; font-size: 13px; margin-top: 12px; }
        ul { list-style: none; padding: 0; margin: 12px 0; color: #374151; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Page not found</h1>
        <p>That URL isn’t mapped. Try one of these:</p>
        <ul>
            <li>/ (home)</li>
            <li>/upload</li>
            <li>/dashboard</li>
            <li>/reports</li>
            <li>/report</li>
            <li>/landowners</li>
            <li>/visualization</li>
            <li>/map</li>
        </ul>
        <a href="/">Go to home</a>
        <a href="/upload">Upload</a>
        <p class="muted">Need another path added? Let me know the exact URL.</p>
    </div>
</body>
</html>
